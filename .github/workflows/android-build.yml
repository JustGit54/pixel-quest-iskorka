name: Build Pixel Quest APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Настроить Android SDK
        uses: android-actions/setup-android@v3

      - name: Установить Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Установить зависимости
        run: npm ci --no-audit --no-fund

      - name: Собрать игру
        run: npm run build

      - name: Создать Android-проект
        run: |
          npx cap add android
          npm run android:prepare
          npx cap sync android

      - name: Собрать APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Сохранить установочный APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelQuest-Iskorka-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
